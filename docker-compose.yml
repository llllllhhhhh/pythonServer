services:
  mysql:
    image: mysql:8.4
    container_name: xuetuxing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: xuetuxing
      MYSQL_USER: xuetuxing
      MYSQL_PASSWORD: xuetuxing123
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: xuetuxing-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: xuetuxing-api
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: xuetuxing
      MYSQL_PASSWORD: xuetuxing123
      MYSQL_DATABASE: xuetuxing
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      ADMIN_API_KEY: xuetuxing-dev-key
      # Development/HBuilderX uses a changing H5 port. Production should
      # replace this with the actual frontend domain.
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
